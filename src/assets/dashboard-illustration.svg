<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Elements -->
  <rect x="20" y="40" width="360" height="240" rx="12" fill="#F0F9FF" opacity="0.5"/>

  <!-- Main Dashboard Card -->
  <rect x="40" y="60" width="320" height="200" rx="10" fill="white" stroke="#3B82F6" stroke-width="2"/>

  <!-- Header Section -->
  <rect x="60" y="80" width="80" height="12" rx="6" fill="#3B82F6" opacity="0.3"/>
  <rect x="60" y="100" width="120" height="8" rx="4" fill="#93C5FD" opacity="0.5"/>

  <!-- Chart Bars -->
  <rect x="70" y="180" width="25" height="50" rx="4" fill="#3B82F6"/>
  <rect x="110" y="150" width="25" height="80" rx="4" fill="#60A5FA"/>
  <rect x="150" y="160" width="25" height="70" rx="4" fill="#3B82F6"/>
  <rect x="190" y="140" width="25" height="90" rx="4" fill="#60A5FA"/>
  <rect x="230" y="170" width="25" height="60" rx="4" fill="#3B82F6"/>

  <!-- Baseline -->
  <line x1="70" y1="235" x2="255" y2="235" stroke="#E5E7EB" stroke-width="2"/>

  <!-- Document Icons -->
  <g transform="translate(270, 80)">
    <rect width="60" height="70" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
    <line x1="10" y1="15" x2="50" y2="15" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="25" x2="40" y2="25" stroke="#93C5FD" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="35" x2="45" y2="35" stroke="#93C5FD" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="45" x2="35" y2="45" stroke="#93C5FD" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Floating Document 2 -->
  <g transform="translate(280, 170)">
    <rect width="50" height="60" rx="4" fill="white" stroke="#3B82F6" stroke-width="1.5"/>
    <line x1="8" y1="12" x2="42" y2="12" stroke="#60A5FA" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="8" y1="20" x2="35" y2="20" stroke="#93C5FD" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="8" y1="28" x2="38" y2="28" stroke="#93C5FD" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Currency Symbol -->
  <circle cx="300" cy="50" r="18" fill="#3B82F6" opacity="0.9"/>
  <text x="300" y="58" text-anchor="middle" fill="white" font-size="20" font-weight="bold">€</text>

  <!-- Checkmark -->
  <circle cx="340" cy="90" r="15" fill="#10B981" opacity="0.9"/>
  <path d="M335 90 L339 94 L345 86" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Trend Arrow -->
  <path d="M 80 125 Q 100 115 120 120" stroke="#10B981" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M 115 117 L 120 120 L 117 125" fill="#10B981"/>
</svg>
