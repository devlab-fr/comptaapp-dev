<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ComptaApp Icon Generator</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #28a745;
      margin-bottom: 20px;
    }
    canvas {
      border: 1px solid #ddd;
      margin: 10px;
      border-radius: 8px;
      background: #f9f9f9;
    }
    .preview {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 30px;
      margin: 30px 0;
    }
    .preview-item {
      text-align: center;
      padding: 20px;
      background: #fafafa;
      border-radius: 8px;
    }
    button {
      background: #28a745;
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      margin: 5px;
      transition: all 0.2s;
    }
    button:hover {
      background: #218838;
      transform: translateY(-1px);
    }
    .info {
      background: #d1f5e1;
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
      border-left: 4px solid #28a745;
      line-height: 1.6;
    }
    .info code {
      background: rgba(0,0,0,0.05);
      padding: 2px 6px;
      border-radius: 3px;
      font-family: monospace;
    }
    .label {
      margin-top: 12px;
      font-size: 13px;
      color: #666;
      font-weight: 500;
    }
    .size-label {
      font-size: 11px;
      color: #999;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ComptaApp - Générateur d'icônes PWA</h1>

    <div class="info">
      <strong>Instructions:</strong>
      <ol style="margin: 10px 0; padding-left: 20px;">
        <li>Cliquez sur "Générer les icônes" ci-dessous</li>
        <li>Téléchargez chaque icône avec le bouton "Télécharger"</li>
        <li>Placez les fichiers dans <code>public/icons/</code></li>
        <li>Les icônes maskables respectent la safe zone Android (80% central)</li>
      </ol>
    </div>

    <div style="text-align: center; margin: 20px 0;">
      <button onclick="generateIcons()">🎨 Générer les icônes</button>
    </div>

    <div class="preview" id="preview"></div>
  </div>

  <script>
    const icons = [
      { name: 'icon-192.png', size: 192, maskable: false },
      { name: 'icon-512.png', size: 512, maskable: false },
      { name: 'maskable-192.png', size: 192, maskable: true },
      { name: 'maskable-512.png', size: 512, maskable: true }
    ];

    function drawLogo(ctx, size, maskable) {
      const center = size / 2;
      const scale = maskable ? 0.35 : 0.42;
      const logoSize = size * scale;

      const green = '#28a745';
      const darkGreen = '#1e7e34';

      const barWidth = logoSize * 0.18;
      const barGap = logoSize * 0.06;
      const totalWidth = (barWidth * 3) + (barGap * 2);
      const startX = center - totalWidth / 2;

      const bars = [
        { height: logoSize * 0.45, color: green },
        { height: logoSize * 0.70, color: green },
        { height: logoSize * 0.95, color: darkGreen }
      ];

      bars.forEach((bar, index) => {
        const x = startX + (index * (barWidth + barGap));
        const y = center + (logoSize / 2) - bar.height;

        const gradient = ctx.createLinearGradient(x, y, x, y + bar.height);
        gradient.addColorStop(0, bar.color);
        gradient.addColorStop(1, index === 2 ? '#155724' : '#1e7e34');

        ctx.fillStyle = gradient;
        ctx.shadowColor = 'rgba(0, 0, 0, 0.2)';
        ctx.shadowBlur = size * 0.01;
        ctx.shadowOffsetY = size * 0.005;

        const cornerRadius = barWidth * 0.15;
        roundRect(ctx, x, y, barWidth, bar.height, cornerRadius);
        ctx.fill();

        ctx.shadowColor = 'transparent';
        ctx.shadowBlur = 0;
        ctx.shadowOffsetY = 0;
      });

      const baseY = center + (logoSize / 2) + (size * 0.01);
      ctx.fillStyle = '#6c757d';
      ctx.fillRect(startX - (barGap / 2), baseY, totalWidth + barGap, size * 0.008);
    }

    function roundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height);
      ctx.lineTo(x, y + height);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    function generateIcon(size, maskable) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(0, 0, size, size);

      drawLogo(ctx, size, maskable);

      if (maskable) {
        ctx.strokeStyle = 'rgba(40, 167, 69, 0.15)';
        ctx.lineWidth = size * 0.003;
        const safeZone = size * 0.1;
        ctx.setLineDash([size * 0.01, size * 0.01]);
        ctx.strokeRect(safeZone, safeZone, size - safeZone * 2, size - safeZone * 2);
      }

      return canvas;
    }

    function generateIcons() {
      const preview = document.getElementById('preview');
      preview.innerHTML = '';

      icons.forEach(icon => {
        const canvas = generateIcon(icon.size, icon.maskable);
        const displayCanvas = canvas.cloneNode();
        displayCanvas.width = canvas.width;
        displayCanvas.height = canvas.height;
        const displayCtx = displayCanvas.getContext('2d');
        displayCtx.drawImage(canvas, 0, 0);

        displayCanvas.style.width = '160px';
        displayCanvas.style.height = '160px';
        displayCanvas.style.imageRendering = 'crisp-edges';

        const div = document.createElement('div');
        div.className = 'preview-item';

        const label = document.createElement('div');
        label.className = 'label';
        label.textContent = icon.name;

        const sizeLabel = document.createElement('div');
        sizeLabel.className = 'size-label';
        sizeLabel.textContent = `${icon.size}×${icon.size}px${icon.maskable ? ' (maskable)' : ''}`;

        const downloadBtn = document.createElement('button');
        downloadBtn.textContent = 'Télécharger';
        downloadBtn.onclick = () => downloadCanvas(canvas, icon.name);
        downloadBtn.style.fontSize = '13px';
        downloadBtn.style.padding = '8px 16px';
        downloadBtn.style.marginTop = '12px';

        div.appendChild(displayCanvas);
        div.appendChild(label);
        div.appendChild(sizeLabel);
        div.appendChild(downloadBtn);
        preview.appendChild(div);
      });
    }

    function downloadCanvas(canvas, filename) {
      canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }, 'image/png');
    }

    window.onload = generateIcons;
  </script>
</body>
</html>
